#
  # ─── Job 2: Run only when PR is merged to main from dev ───────────────────
  cd:
    name: Deploy to Render
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'dev'
    permissions:
      deployments: write

    steps:
      - name: Notify Discord - Deploy Started
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" -X POST \
          -d '{
            "embeds": [{
              "title": "🔄 Deploying to Production...",
              "description": "PR #'"${{ github.event.pull_request.number }}"' merged — deploy in progress",
              "color": 16776960,
              "fields": [
                { "name": "📋 PR", "value": "'"${{ github.event.pull_request.title }}"'", "inline": true },
                { "name": "👤 Merged by", "value": "'"${{ github.event.pull_request.merged_by.login }}"'", "inline": true }
              ],
              "footer": { "text": "'"${{ github.repository }}"'" },
              "timestamp": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"
            }]
          }' $DISCORD_WEBHOOK

      - name: Deploy to Render
        id: render
        uses: JorgeLNJunior/render-deploy@v1.5.0
        with:
          service_id: ${{ secrets.RENDER_SERVICE_ID }}
          api_key: ${{ secrets.RENDER_API_KEY }}
          wait_deploy: true
          github_deployment: true
          deployment_environment: production
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Discord - Deploy Success
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" -X POST \
          -d '{
            "embeds": [{
              "title": "✅ Production Deployed!",
              "description": "PR #'"${{ github.event.pull_request.number }}"' is now live",
              "color": 3066993,
              "fields": [
                { "name": "📋 PR", "value": "'"${{ github.event.pull_request.title }}"'", "inline": true },
                { "name": "👤 Merged by", "value": "'"${{ github.event.pull_request.merged_by.login }}"'", "inline": true },
                { "name": "🔗 Link", "value": "'"${{ github.event.pull_request.html_url }}"'" }
              ],
              "footer": { "text": "'"${{ github.repository }}"'" },
              "timestamp": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"
            }]
          }' $DISCORD_WEBHOOK

      - name: Notify Discord - Deploy Failed
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" -X POST \
          -d '{
            "embeds": [{
              "title": "❌ Production Deploy Failed!",
              "description": "PR #'"${{ github.event.pull_request.number }}"' deploy failed — check Render logs",
              "color": 15158332,
              "fields": [
                { "name": "📋 PR", "value": "'"${{ github.event.pull_request.title }}"'", "inline": true },
                { "name": "👤 Merged by", "value": "'"${{ github.event.pull_request.merged_by.login }}"'", "inline": true },
                { "name": "🔗 Link", "value": "'"${{ github.event.pull_request.html_url }}"'" }
              ],
              "footer": { "text": "'"${{ github.repository }}"'" },
              "timestamp": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"
            }]
          }' $DISCORD_WEBHOOK